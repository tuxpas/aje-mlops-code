# buildspec-deploy.yml
# CodeBuild stage: upsert the SageMaker Pipeline definition and optionally start an execution.
#
# Required CodeBuild project settings:
#   - Privileged mode: NOT required
#   - IAM permissions: sagemaker:CreatePipeline, sagemaker:UpdatePipeline,
#                      sagemaker:StartPipelineExecution, sagemaker:DescribePipeline,
#                      sagemaker:ListPipelineExecutions, iam:PassRole,
#                      s3:PutObject, s3:GetObject, s3:ListBucket,
#                      sts:GetCallerIdentity
#
# Environment variables (set in CodeBuild project or pipeline action):
#   PAIS      – Country code to execute: EC | MX | PE | CR | GT | NI | PA
#               Required only when EJECUTAR=true.
#   EJECUTAR  – Set to "true" to start a pipeline execution after upsert.
#               Defaults to "false" (upsert only).
#
# This buildspec is designed to run from the repository root.

version: 0.2

env:
  variables:
    EJECUTAR: "false"
    PAIS: ""
    STAGE: "dev"
    REGION: "us-east-2"

phases:
  install:
    runtime-versions:
      python: "3.9"
    commands:
      - echo "==> Installing deploy dependencies..."
      - pip install --quiet --upgrade pip
      - pip install --quiet "sagemaker>=2.200.0" boto3

  pre_build:
    commands:
      - echo "==> Deploy configuration"
      - echo "    PAIS      = ${PAIS}"
      - echo "    EJECUTAR  = ${EJECUTAR}"
      - echo "    STAGE     = ${STAGE}"
      - echo "    REGION    = ${REGION}"
      - |
        if [ "${EJECUTAR}" = "true" ] && [ -z "${PAIS}" ]; then
          echo "ERROR: PAIS must be set when EJECUTAR=true." && exit 1
        fi

  build:
    commands:
      - echo "==> Upserting SageMaker Pipeline..."
      - |
        cd cicd && python3 -c "
        import os, sys
        sys.path.insert(0, '.')
        from scripts.deploy_sagemaker_pipeline import main
        ejecutar = os.environ.get('EJECUTAR', 'false').lower() == 'true'
        main(ejecutar=ejecutar)
        "

  post_build:
    commands:
      - echo "==> Deploy stage complete."
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ]; then
          if [ "${EJECUTAR}" = "true" ]; then
            echo "Pipeline upserted and execution started for PAIS=${PAIS}."
          else
            echo "Pipeline upserted (EJECUTAR=false, no execution started)."
          fi
        else
          echo "Deploy failed — check logs above." && exit 1
        fi
